<body class="pk-dark">
    <navbar>
        <nav id="main-nav">
            <a href="https://k-meine-institut.github.io/aboutKMeine/">Startseite</a>
            <a href="https://k-meine-institut.github.io/aboutKMeine/aktuelles/">Aktuelles</a>

            <a href="https://k-meine-institut.github.io/aboutKMeine/kontakt/">Kontakt</a>
        </nav>
    </navbar>
    <main class="fly-in-text pk-container">
        <h1>Kontakt</h1>
        <p>
            Sie möchten mit dem K.-Meine-Institut in Kontakt treten?<br />
            Nutzen Sie das folgende Formular oder schreiben Sie direkt an
            <a href="mailto:leander.kafemann+kmeineinstitut@icloud.com">info@k-meine-institut.de</a>.
        </p>
        <form class="contactForm">
            <input type="text" placeholder="Ihr Name" required />
            <input type="email" placeholder="Ihre E-Mail" required />
            <textarea placeholder="Ihre Nachricht" rows="5" required></textarea>
            <button type="submit" class="login_button">Absenden</button>
        </form>
    </main>
    <div class="footerContainer">
        <footer>
            <p class="placeholder">Copyright</p>
            <p class="correct">Version 0.6.0 – Copyright 2025 K. Meine Institut + Leander Kafemann</p>
        </footer>
    </div>
