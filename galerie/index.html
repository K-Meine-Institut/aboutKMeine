<body class="pk-dark">
    <header class="pk-navbar">
        <a href="https://k-meine-institut.github.io/aboutKMeine/" class="pk-navbar-brand">K. Meine Institut</a>
        <nav id="main-nav" class="pk-navbar-nav">
            <a href="https://k-meine-institut.github.io/aboutKMeine/" class="pk-nav-link">Startseite</a>
            <a href="https://k-meine-institut.github.io/aboutKMeine/aktuelles/" class="pk-nav-link">Aktuelles</a>
            <a href="https://k-meine-institut.github.io/aboutKMeine/kuenstler/" class="pk-nav-link">K. Meine</a>
            <a href="https://k-meine-institut.github.io/aboutKMeine/institut/" class="pk-nav-link">Institut</a>
            <a href="https://k-meine-institut.github.io/aboutKMeine/galerie/" class="pk-nav-link">Galerie</a>
            <a href="https://k-meine-institut.github.io/aboutKMeine/kontakt/" class="pk-nav-link">Kontakt</a>
        </nav>
    </header>
    <main class="fly-in-text pk-container">
        <h1>Galerie</h1>
        <p>Bildmaterial zu K. Meine und dem Institut</p>

        <section>
            <h2>Die Büste</h2>
            <figure style="margin: 1.5rem auto; text-align: center;">
                <img src="../images/bueste.jpg"
                     alt="Büste von K. Meine im Prunksaal des Wiener Musikvereins"
                     class="photoElement" />
                <figcaption style="color: ghostwhite; font-size: 0.85rem; margin-top: 0.75rem;">
                    Büste von K. Meine, Prunksaal des Wiener Musikvereins<br />
                    <em>Kürzlich als Bildnis von K. Meine (1798–1857) identifiziert</em>
                </figcaption>
            </figure>
        </section>

        <section>
            <h2>Der Ehren-Stern auf dem Walk of Fame</h2>
            <figure style="margin: 1.5rem auto; text-align: center;">
                <img src="../images/stern.svg"
                     alt="Ehren-Stern von K. Meine auf dem Walk of Fame vor dem Wiener Musikverein"
                     class="photoElement" />
                <figcaption style="color: ghostwhite; font-size: 0.85rem; margin-top: 0.75rem;">
                    Ehren-Stern von K. Meine auf dem Walk of Fame vor dem Wiener Musikverein<br />
                    <em>Dieser Stern ist nicht mehr vorhanden. Er wurde im Zuge einer Renovierung
                    des Gehwegs vor dem Musikverein entfernt.</em>
                </figcaption>
            </figure>
        </section>
    </main>
    <div class="footerContainer">
        <footer>
            <p class="placeholder">Copyright</p>
