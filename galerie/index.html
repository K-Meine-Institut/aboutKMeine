<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie – K. Meine Institut</title>
    <meta name="author" content="Leander Kafemann" />
    <meta name="keywords" content="K. Meine, Galerie, Büste, Wiener Musikverein, Bilder" />
    <meta name="google-site-verification" content="7B0CF-ClfZaLgOrvs32NkRIFktgrLNCGxIwQPBNUqBs" />
    <link rel="manifest" href="https://k-meine-institut.github.io/aboutKMeine/manifest.json" />
    <link rel="icon" type="image/jpeg" href="../images/bueste.jpg" />
    <!-- PowerKit -->
    <link rel="stylesheet" href="https://leanderkafemann.github.io/PowerKit/powerkit.css" />
    <link rel="stylesheet" href="https://leanderkafemann.github.io/PowerKit/powerkit-pro.css" />
    <!-- Site styles -->
    <link rel="stylesheet" href="https://k-meine-institut.github.io/aboutKMeine/styling/style.css" />
    <link rel="stylesheet" href="https://k-meine-institut.github.io/aboutKMeine/styling/box.css" />
    <link rel="stylesheet" href="https://k-meine-institut.github.io/aboutKMeine/styling/forms.css" />
    <link rel="stylesheet" href="https://k-meine-institut.github.io/aboutKMeine/styling/responsive-nav.css" />
</head>
<body class="pk-dark">
    <header class="pk-navbar">
        <a href="https://k-meine-institut.github.io/aboutKMeine/" class="pk-navbar-brand">K. Meine Institut</a>
        <nav id="main-nav" class="pk-navbar-nav">
            <a href="https://k-meine-institut.github.io/aboutKMeine/" class="pk-nav-link">Startseite</a>
            <a href="https://k-meine-institut.github.io/aboutKMeine/aktuelles/" class="pk-nav-link">Aktuelles</a>
            <a href="https://k-meine-institut.github.io/aboutKMeine/kuenstler/" class="pk-nav-link">K. Meine</a>
            <a href="https://k-meine-institut.github.io/aboutKMeine/institut/" class="pk-nav-link">Institut</a>
            <a href="https://k-meine-institut.github.io/aboutKMeine/galerie/" class="pk-nav-link">Galerie</a>
            <a href="https://k-meine-institut.github.io/aboutKMeine/kontakt/" class="pk-nav-link">Kontakt</a>
        </nav>
    </header>
    <main class="fly-in-text pk-container">
        <div class="pk-hero pk-hero-dark" style="padding: 2rem 1rem 1.5rem; border-radius: 16px; margin-bottom: 1.5rem;">
            <h1 class="pk-hero-title" style="font-size: clamp(1.8rem, 5vw, 2.8rem);">Galerie</h1>
            <p class="pk-hero-sub">Bildmaterial zu K. Meine und dem Institut</p>
        </div>

        <section class="pk-section" style="padding: 0.5rem 0 1.5rem;">
            <div class="pk-card pk-card-glass" style="max-width: 700px; margin: 0 auto; border-radius: 16px; padding: 1.5rem;">
                <div class="gallery-card-header">
                    <h2 style="margin: 0;">Die Büste</h2>
                    <span class="pk-badge pk-badge-gray">Fotodokument</span>
                </div>
                <div class="pk-card-body">
                    <figure style="margin: 0; text-align: center;">
                        <img src="../images/bueste.jpg"
                             alt="Büste von K. Meine im Prunksaal des Wiener Musikvereins"
                             class="photoElement" />
                        <figcaption class="gallery-figcaption">
                            Büste von K. Meine, Prunksaal des Wiener Musikvereins<br />
                            <em>Kürzlich als Bildnis von K. Meine (1798–1857) identifiziert</em>
                        </figcaption>
                    </figure>
                </div>
            </div>
        </section>

        <section class="pk-section" style="padding: 0.5rem 0 1.5rem;">
            <div class="pk-card pk-card-glass" style="max-width: 700px; margin: 0 auto; border-radius: 16px; padding: 1.5rem;">
                <div class="gallery-card-header">
                    <h2 style="margin: 0;">Der Ehren-Stern auf dem Walk of Fame</h2>
                    <span class="pk-badge pk-badge-gray">Historisch</span>
                </div>
                <div class="pk-card-body">
                    <figure style="margin: 0; text-align: center;">
                        <img src="../images/IMG_9142.png"
                             alt="Ehren-Stern von K. Meine auf dem Walk of Fame vor dem Wiener Musikverein"
                             class="photoElement" />
                        <figcaption class="gallery-figcaption">
                            Ehren-Stern von K. Meine auf dem Walk of Fame vor dem Wiener Musikverein<br />
                            <em>Dieser Stern ist nicht mehr vorhanden. Er wurde im Zuge einer Renovierung
                            des Gehwegs vor dem Musikverein entfernt.</em>
                        </figcaption>
                    </figure>
                </div>
            </div>
        </section>
    </main>
    <div class="footerContainer">
        <footer>
            <p class="placeholder">Copyright</p>
            <p class="correct">Version 0.6.0 – Copyright 2025 K. Meine Institut + Leander Kafemann</p>
        </footer>
    </div>
    <script src="https://leanderkafemann.github.io/PowerKit/powerkit.js"></script>
    <script src="https://k-meine-institut.github.io/aboutKMeine/js/main.js"></script>
    <script type="text/javascript" src="https://buero-os-toolkit-development.github.io/BueroWebKit/js/modernStyleEffects.js"></script>
    <script src="https://k-meine-institut.github.io/aboutKMeine/js/responsive-nav.js"></script>
</body>
</html>
